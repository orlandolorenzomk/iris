server:
  port: ${SERVER_PORT}
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}
  admin:
    default-email: ${ADMIN_DEFAULT_EMAIL}
    default-password: ${ADMIN_DEFAULT_PASSWORD}
  cluster:
    sdn-zone-type: ${SDN_ZONE_TYPE}
    sdn-zone-name: ${SDN_ZONE_NAME}
    nats-url: ${NATS_URL}

